name: React CI CD Workflow
on: 
  workflow_dispatch:
  push:
    branches:
     - main

    
jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v6

      - name: Setup Node.js environment
        uses: actions/setup-node@v6
        with:
          node-version: 20
      
      - name: Install dependencies and build app
        run: |
          npm ci 
          npm run build
      
      - name: Upload artifacts
        uses: actions/upload-artifact@v4
        with:
          name: react-artifact-build
          path: ./dist

  test:
    needs: build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository in test job
        uses: actions/checkout@v6

      - name: Setup Node.js environment in test job
        uses: actions/setup-node@v6
        with:
          node-version: 20

      - name: Install dependencies
        run: npm ci
  
      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: react-artifact-build
          path: dist

      - name: Run Unit Tests for app
        run: npm test -- --watchAll=false
        
      - name: Validate Build Output
        run: |
          test -f dist/index.html
          echo "Build file exists"
   
  deploy-to-azure:
    runs-on: ubuntu-latest
    needs: test

    env:
      AZURE_CONTAINER_REGISTRY: devopshorizon
      RESOURCE_GROUP: 1-42e46d9a-playground-sandbox
      CONTAINER_APP_NAME: devops-horizon-container-app

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Download Build Artifact
        uses: actions/download-artifact@v4
        with:
          name: react-artifact-build
          path: dist

      - name: Log in to ACR
        uses: docker/login-action@v3
        with:
          registry: ${{ env.AZURE_CONTAINER_REGISTRY }}.azurecr.io
          username: ${{ secrets.AZURE_REGISTRY_USERNAME }}
          password: ${{ secrets.AZURE_REGISTRY_PASSWORD }}